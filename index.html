<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tahmin Ligi 2026</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --accent: #10b981;
            --accent-hover: #059669;
            --text: #f8fafc;
            --text-muted: #94a3b8;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .container {
            max-width: 500px;
            width: 100%;
        }
        .logo-area {
            text-align: center;
            margin-bottom: 20px;
        }
        .logo-area img {
            width: 80px;
            height: 80px;
        }
        h1 {
            text-align: center;
            color: var(--text);
            margin: 0 0 5px 0;
            font-size: 24px;
        }
        .subtitle {
            text-align: center;
            color: var(--text-muted);
            margin-bottom: 30px;
            font-size: 14px;
        }
        .card {
            background-color: var(--card-bg);
            border-radius: 16px;
            padding: 25px;
            margin-bottom: 20px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3);
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            color: var(--text);
            font-size: 14px;
        }
        input {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #334155;
            background-color: #1e293b;
            color: var(--text);
            box-sizing: border-box;
            font-size: 14px;
        }
        button {
            background-color: var(--accent);
            color: white;
            border: none;
            padding: 14px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            font-size: 16px;
            transition: background 0.2s;
        }
        button:hover {
            background-color: var(--accent-hover);
        }
        .match-card {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px;
            background: #0f172a;
            border-radius: 12px;
            margin-bottom: 12px;
        }
        .team {
            display: flex;
            align-items: center;
            gap: 8px;
            flex: 1;
            font-size: 14px;
        }
        .team.right {
            justify-content: flex-end;
        }
        .flag {
            font-size: 20px;
        }
        .score-inputs {
            display: flex;
            gap: 8px;
            align-items: center;
        }
        .score-inputs input {
            width: 45px;
            height: 45px;
            text-align: center;
            font-size: 16px;
            font-weight: bold;
            padding: 0;
            border-radius: 8px;
            background: #1e293b;
        }
        /* Açılır Kapanır Maç Sonuçları (Accordion) */
        .accordion-btn {
            background-color: #334155;
            color: var(--text);
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            margin-top: 20px;
        }
        .accordion-content {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.3s ease-out;
            background: #0f172a;
            border-radius: 0 0 8px 8px;
        }
        .accordion-content.open {
            max-height: 500px;
            padding: 15px;
            margin-bottom: 20px;
            border: 1px solid #334155;
            border-top: none;
        }
        table {
            width: 100%;
            border-collapse: collapse;
        }
        th, td {
            text-align: left;
            padding: 12px;
            border-bottom: 1px solid #334155;
            font-size: 14px;
        }
        th { color: var(--text-muted); }
    </style>
</head>
<body>

<div class="container">
    <div class="logo-area">
        <span style="font-size: 60px;">⚽</span>
    </div>
    <h1>Tahmin Ligi 2026</h1>
    <div class="subtitle">Dünya Kupası Tahmin Oyunu</div>

    <div class="card" id="loginCard">
        <div class="form-group">
            <label>Oyuncu Adı</label>
            <input type="text" id="username" placeholder="Adınızı girin">
        </div>
        <button onclick="login()">Giriş Yap</button>
    </div>

    <div class="card" id="predictionCard" style="display: none;">
        <h3>Hoş geldin, <span id="userDisplay" style="color: var(--accent);"></span>!</h3>
        <p style="color: var(--text-muted); font-size: 13px; margin-bottom: 20px;">Tahminlerini gir ve ortak havuza gönder.</p>
        
        <div id="matchesContainer">
            <div class="match-card">
                <div class="team">
                    <span class="flag">🇹🇷</span>
                    <span>Türkiye</span>
                </div>
                <div class="score-inputs">
                    <input type="number" id="skor1" min="0" placeholder="0">
                    <span style="color:var(--text-muted)">-</span>
                    <input type="number" id="skor2" min="0" placeholder="0">
                </div>
                <div class="team right">
                    <span>İtalya</span>
                    <span class="flag">🇮🇹</span>
                </div>
            </div>
        </div>
        <button onclick="savePredictions()">Tahminleri Kaydet</button>
    </div>

    <div class="card">
        <h3>📊 Genel Puan Durumu</h3>
        <table>
            <thead>
                <tr>
                    <th>Sıra</th>
                    <th>Oyuncu</th>
                    <th>Puan</th>
                </tr>
            </thead>
            <tbody id="leaderboardBody">
                <tr>
                    <td colspan="3" style="text-align: center; color: var(--text-muted);">Yükleniyor...</td>
                </tr>
            </tbody>
        </table>
    </div>

    <div class="accordion-btn" onclick="toggleAccordion()">
        <span>🏆 Canlı Maç Sonuçları</span>
        <span id="arrow">▼</span>
    </div>
    <div class="accordion-content" id="accordionContent">
        <div style="display:flex; justify-content:space-between; color:var(--text-muted); font-size:13px; border-bottom:1px solid #334155; padding-bottom:8px;">
            <span>Maç</span>
            <span>Sonuç</span>
        </div>
        <div style="display:flex; justify-content:space-between; padding:10px 0; font-size:14px;">
            <span>🇹🇷 Türkiye - İtalya 🇮🇹</span>
            <span style="font-weight:bold; color:var(--accent);">Henüz Oynanmadı</span>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBj0Sf7raTruV3sn4bXRyOR0QPluOpN_GI",
        authDomain: "wc2026-4d9f7.firebaseapp.com",
        projectId: "wc2026-4d9f7",
        storageBucket: "wc2026-4d9f7.firebasestorage.app",
        messagingSenderId: "1038407828464",
        appId: "1:1038407828464:web:1e701b5039f3f33b0f5335",
        databaseURL: "https://wc2026-4d9f7-default-rtdb.firebaseio.com/"
    };

    const app = initializeApp(firebaseConfig);
    const database = getDatabase(app);

    // Butonların çalışabilmesi için fonksiyonları pencereye (window) bağlıyoruz
    window.login = function() {
        const name = document.getElementById('username').value.trim();
        if(!name) return alert('Lütfen adınızı girin!');
        localStorage.setItem('wc_user', name);
        showUserScreen(name);
    }

    function showUserScreen(name) {
        document.getElementById('loginCard').style.display = 'none';
        document.getElementById('predictionCard').style.display = 'block';
        document.getElementById('userDisplay').innerText = name;
    }

    window.savePredictions = function() {
        const name = localStorage.getItem('wc_user');
        const s1 = document.getElementById('skor1').value;
        const s2 = document.getElementById('skor2').value;

        if(s1 === "" || s2 === "") return alert("Lütfen skor girin!");

        set(ref(database, 'users/' + name), {
            username: name,
            tahmin: s1 + "-" + s2,
            puan: 0
        }).then(() => {
            alert("Tahminleriniz başarıyla ortak havuza kaydedildi!");
        });
    }

    // Ortak havuzdan anlık liste güncelleme
    onValue(ref(database, 'users'), (snapshot) => {
        const data = snapshot.val();
        const tbody = document.getElementById('leaderboardBody');
        tbody.innerHTML = "";

        if(!data) {
            tbody.innerHTML = `<tr><td colspan="3" style="text-align: center; color: var(--text-muted);">Henüz tahmin yok.</td></tr>`;
            return;
        }

        let index = 1;
        for (let user in data) {
            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td>${index++}</td>
                <td><b>${data[user].username}</b> <span style="font-size:12px; color:var(--text-muted);">(Tahmin: ${data[user].tmin || data[user].tahmin || 'Yok'})</span></td>
                <td>${data[user].puan}</td>
            `;
            tbody.appendChild(tr);
        }
    });

    // Sayfa yenilendiğinde otomatik giriş kontrolü
    const savedUser = localStorage.getItem('wc_user');
    if(savedUser) showUserScreen(savedUser);

    // Açılır kapanır kutu fonksiyonu
    window.toggleAccordion = function() {
        const content = document.getElementById('accordionContent');
        const arrow = document.getElementById('arrow');
        content.classList.toggle('open');
        if(content.classList.contains('open')) {
            arrow.innerText = "▲";
        } else {
            arrow.innerText = "▼";
        }
    }
</script>

</body>
</html>
